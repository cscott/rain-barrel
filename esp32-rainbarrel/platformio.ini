; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
; OTA upload targets are in default_envs so `pio run -t upload` works
default_envs = rainpump32, raingauge32

[env]
framework = arduino
lib_ldf_mode = chain+
monitor_speed = 115200
test_ignore = test_desktop

; Digispark fuses should be:
; Low fuse: 0xE1
; High fuse: 0x5D (clear RSTDISBL, set BODLEVEL to 2.7V)
; Extended fuse: 0xFE
; https://www.youtube.com/watch?v=Qw54GcPNIf8
; http://digistump.com/wiki/digispark/tutorials/programming
; fuses setting below is incompatible with programmer=micronucleus, unfortunately
; https://www.instructables.com/How-to-unlock-Digispark-ATtiny85-and-convert-it-to/
; This is correct on "real" digistump but not set correctly on the clones!
; (clones are low: 0xF1 / high: 0xDF / extended: 0xFE)
; (BODLEVEL disabled, RST enabled)
; See https://learn.adafruit.com/program-an-avr-or-arduino-using-raspberry-pi-gpio-pins/programming
; sudo avrdude -p attiny85 -C ~/avrdude_gpio.conf -c pi_1 -v -Ulfuse:w:0xE1:m -Uhfuse:w:0x5D:m


[env:flowmeter1]
platform = atmelavr
board = digispark-tiny
build_flags = -DFLOWMETER -DFLOWMETER_OFFSET=0
build_src_filter=+<flowmeter.cpp>
board_fuses.lfuse=0xE1
board_fuses.hfuse=0x5D
board_fuses.efuse=0xFE

[env:flowmeter2]
platform = atmelavr
board = digispark-tiny
build_flags = -DFLOWMETER -DFLOWMETER_OFFSET=1
build_src_filter=+<flowmeter.cpp>

[env:flowmeter3]
platform = atmelavr
board = digispark-tiny
build_flags = -DFLOWMETER -DFLOWMETER_OFFSET=2
build_src_filter=+<flowmeter.cpp>

[env:flowtester]
platform = espressif8266
board = huzzah
build_flags = -DFLOW_TESTER -DFLOWMETER_OFFSET=0
build_src_filter=+<flowtester.cpp>
;upload_port = /dev/ttyUSB0
upload_protocol = espota
upload_port = flowtester.local
;upload_port = 192.168.198.238
upload_flags = --auth=goaway
lib_deps =
	adafruit/Adafruit SH110X@^2.0.0
	adafruit/Adafruit BusIO@^1.7.5
	stevemarple/AsyncDelay@^1.1.2

